<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>deCMS - Edit Link Component</title>

    <link type="text/css" rel="stylesheet" href="https://www.gstatic.com/firebasejs/ui/4.8.0/firebase-ui-auth.css"/>
    <link type="text/css" rel="stylesheet" href="/styles/styles2.css"  />
    <link type="text/css" rel="stylesheet" href="/node_modules/menu-buddy/MB_Select.css"  />
    
    <script type="module">
      import Context from "./lib/Context.js";
      import De_Project from "./lib/De_Project.js";
      import De_Component_Link from "./lib/De_Component_Link.js";
      import Utils from "./lib/Utils.js";
      import Header_Buddy from './node_modules/header-buddy/Header_Buddy.js';
      import Menu_Buddy from './node_modules/menu-buddy/Menu_Buddy.mjs';
      import Menu_Buddy_Btn from './node_modules/menu-buddy/Menu_Buddy_Btn.mjs';
      import MB_Select from './node_modules/menu-buddy/MB_Select.mjs';
      customElements.define(Header_Buddy.tname, Header_Buddy);
      customElements.define(Menu_Buddy.tname, Menu_Buddy);
      customElements.define(Menu_Buddy_Btn.tname, Menu_Buddy_Btn);
      customElements.define(MB_Select.tname, MB_Select);

      window.onload = Main;
      let component;

      // init and auth ============================================================================

      function Main()
      {
        new Context(Header_Signed_In, Header_Signed_Out);
      }

      async function Header_Signed_In(ctx)
      {
        await Prepare_Fields(ctx.db);

        // prepare object
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const project_id = urlParams.get('project_id');
        if (id) // edit form
        {
          component = await De_Component_Link.Select_By_Id(ctx.db, id);
        }
        else // add form
        {
          component = new De_Component_Link();
          //Utils.Hide("id_label");
          //Utils.Hide("id_value");
        }
        if (project_id)
        {
          component.project_id = project_id;
          Utils.Disable("project_value");
        }

        // populate fields
        Obj_To_Fields(component);

        ok_btn.addEventListener("click", e => On_Click_Save(e, ctx));
        cancel_btn.addEventListener("click", On_Click_Cancel);
      }

      function Header_Signed_Out(ctx)
      {
        Clear_Fields();
        Context.Toast_Show("You must sign in.", "warning");
      }


      // fields ===================================================================================

      async function Prepare_Fields(db)
      {
        // project selector
        const projects = await De_Project.Select_All(db);
        for (const project of projects)
        {
          const option_elem = document.createElement("option");
          option_elem.value = project.id;
          option_elem.innerText = project.title;
          project_value.append(option_elem);
        }

        // parent selector
        parent_value.Get_Children = id => De_Component_Link.Get_Children(db, id, component.project_id);
        parent_value.Has_Children = id => De_Component_Link.Has_Children(db, id, component.project_id);
        parent_value.Get_Label = id => De_Component_Link.Get_Title(db, id);
      }

      function Clear_Fields()
      {
        id_value.innerText = "";
        title_value.value = "";
        key_value.value = "";
        type_value.innerText = "";
        url_value.value = "";
        content_value.innerHTML = "";
        project_value.value = null;
        parent_value.value = null;
      }

      function Obj_To_Fields(component)
      {
        id_value.innerText = component.id;
        title_value.value = component.title;
        key_value.value = component.key;
        type_value.innerText = component.content_type;
        url_value.value = component.url;
        content_value.innerHTML = component.content;
        project_value.value = component.project_id;
        parent_value.value = component.parent_id;
      }

      function Fields_To_Obj(component)
      {
        component.title = title_value.value;
        component.key = key_value.value;
        component.url = url_value.value;
        component.content = content_value.value;
        component.project_id = project_value.value;
        component.parent_id = parent_value.value;
      }

      // button footer ============================================================================

      function Return_To_Page()
      {
        //window.history.back();
        window.close();
        window.opener.Page_Refresh();
      }

      async function On_Click_Save(event, ctx)
      {
        event.preventDefault();
        Fields_To_Obj(component);
        const is_saved = await component.Save(ctx.db);
        if (is_saved)
        {
          Return_To_Page();
        }
        else
        {
          Utils.Handle_Errors(ctx.db);
        }
      }

      function On_Click_Cancel(event)
      {
        event.preventDefault();
        Return_To_Page();
      }
    </script>
  </head>

  <body>
    <header-buddy id="header_elem" title="CMS - Component - Text" style-src="styles/Header_Buddy.css"></header-buddy>

    <form id="form">
      <label id="id_label">Id.</label><span id="id_value" class="field_value"></span>
      <label>Title</label><input id="title_value" class="field_value">
      <label>Key</label><input id="key_value" class="field_value">
      <label>Type</label><span id="type_value" class="field_value"></span>
      <label>URL</label><input id="url_value" class="field_value">
      <label>Content</label><textarea id="content_value" rows="5" cols="60" class="field_value"></textarea>
      <label>Project</label><select id="project_value" class="field_value"><option>None</option></select>
      <label>Parent</label><mb-select id="parent_value" root-title="Components" class="field_value"></mb-select>

      <label></label>
      <span>
        <button id="ok_btn" class="button">OK</button>
        <button id="cancel_btn" class="button">Cancel</button>
      </span>
    </form>
  </body>
</html>
